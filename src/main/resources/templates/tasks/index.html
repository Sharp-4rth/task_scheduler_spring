<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head"></head>

<body class="d-flex flex-column min-vh-100">
<div th:replace="fragments/navbar :: navbar"></div>
<div class="flex-grow-1 d-flex align-items-center mt-n5">">
    <div class="container" style="max-width: 700px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">
            <span th:text="${username}"></span>'s Tasks
        </h1>
        <form th:action="@{/tasks/update-max-time}" method="post" class="d-flex gap-2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="number" name="maxTime" class="form-control" style="width: 120px;" min="1"/>
            <button type="submit" class="btn btn-outline-secondary">Change Timeframe</button>
        </form>
        <form th:action="@{/tasks/schedule}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-primary">
                Schedule
            </button>
        </form>
    </div>
    <table class="table table-bordered table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th class="ps-4">Name</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Duration</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td class="ps-4 fw-semibold" th:text="${task.name}"></td>
            <td>
            <span class="badge bg-secondary"
                  th:text="${task.status}"></span>
            </td>
            <td>
            <span class="badge bg-primary"
                  th:text="${task.priority}"></span>
            </td>
            <td>
            <span class="badge bg-success"
                  th:text="${task.duration + ' mins'}"></span>
            </td>
        </tr>
        </tbody>
        </table>
        </div>
    </div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
